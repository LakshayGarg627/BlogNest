{% extends "blog/base.html" %}

{% block content %}
   <div class="content-section">
        <form method="POST" action="">
            {% csrf_token %}
            <fieldset class="form-group mb-4">
                <legend class="border-bottom border-secondary mb-4 pb-2 text-white fw-bold">
                    Delete Post
                </legend>
                <h4 class="mb-4">Are you sure to delete the post "<span class="text-white">{{object.title}}</span>"?</h4>
            </fieldset>
            <div class="form-group">
                <button class="btn btn-outline-danger px-4 rounded-pill fw-bold border-2" type="Submit">Yes, Delete</button>
                <a class="btn btn-outline-secondary px-4 rounded-pill fw-bold border-2 ms-2" href="{% url 'post-detail' object.id %}">Cancel</a>
            </div>
        </form> 
    </div>
{% endblock content %}
